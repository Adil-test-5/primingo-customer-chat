<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primingo Support Chat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="site-header">
    <div class="site-header-inner">
      <a href="https://primingo.com" class="site-logo"><img src="https://primingo.com/wp-content/uploads/2025/07/Primngo.png" alt="Primingo" height="40"></a>
      <div class="site-nav">
        <a href="https://primingo.com">Home</a>
        <a href="https://primingo.com/my-account/primingo-orders/">My Products</a>
        <a href="/order-chat?type=general">Contact Support</a>
        <a href="https://primingo.com/help-center/">Help Center</a>
      </div>
      <a href="https://primingo.com" class="site-btn">Back to Primingo</a>
    </div>
  </nav>

  <div class="app-wrapper">
    <div class="app-layout">
      <div class="chat-panel">
        <div class="chat-panel-header">
          <h1>Primingo Support Chat</h1>
          <p id="context-info"></p>
        </div>
        <div class="order-banner hidden" id="order-banner"></div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-composer">
          <input type="text" id="message-input" placeholder="Type your message..." disabled>
          <button id="send-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </button>
        </div>
      </div>
      <div class="order-panel hidden" id="order-panel">
        <div class="order-card">
          <div class="order-card-header">Selected Order</div>
          <div class="order-card-body" id="order-card-body"></div>
          <div class="order-card-actions">
            <button class="action-btn primary" id="btn-send-order">Send Order Details</button>
            <button class="action-btn accent" id="btn-aftersale">After-sale Support</button>
            <a class="action-btn outline" id="btn-renew" href="#">Renew Product</a>
            <a class="action-btn ghost" href="https://primingo.com/my-account/primingo-orders/">Back to My Products</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
